<!DOCTYPE html>
<html lang="en">
<!--Lab Results Page Script-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operación Salud Colima Tamizaje</title>
    <link rel="stylesheet" href="/src/style.css">
    <link rel="stylesheet" href="/src/assets/theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <!--Red Banner Header-->
    <div class="container-fluid main-body">
        <div class="header-container d-flex flex-row"> 
            <!--Logo-->
            <div class="media">
                <img src="/src/assets/img/logoWhite.png" alt="logo" width="45" height="60">
            </div>
            <!--Project name-->
            <div class="project-title-container">
                <h1 class="project-title" style="font-size: 32px; margin-bottom: 0;">OSCT</h1>
                <h2 class="project-subtitle" style="font-size: 18px; font-weight: 400;">Operación Salud Colima Tamizaje</h2>
            </div>
            <!--Profile Button-->
            <div class="user-container">
                <button type="button" class="btn btn-light user-button">
                    <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 41 41" fill="none">
                        <circle cx="20.5" cy="20.5" r="25" fill="white" stroke="black" stroke-width="2"/>
                    </svg>
                    Profile
                </button>
            </div>
        </div>
    </div>
    <!--Navigation Bar-->
    <div class="navigation-container">
        <nav class="nav nav-pills nav-fill">
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link" href="schedule.html">Schedule</a>
            <a class="nav-link active" aria-current="page" href="lab_results.html">Lab Results</a>
            <a class="nav-link" href="documents.html">Documents</a>
        </nav>
    </div>
   

    <style>
        .main-body {
            background-color: var(--primary-red);
        }
        .header-container {
            background-color: var(--primary-red);
            height: 80px;
            align-items: center;
        }
        .project-title-container {
            color: var(--white);
            text-align: left;
            margin-left: 16px;
        }
        .user-container {
            margin-left: auto;
            margin-right: 16px;
            align-items: center;
        }
        .user-button {
            width: 120px;
            height: 50px;
            flex-shrink: 0;
            display: flex;
            column-gap: 10px;
            justify-content: space-between;
            align-items: center;
            border: 2px solid var(--light-surface-three);
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer; 
            font-size: 16px;
            font-weight: 500;
            color: var(--dark-surface-three)
        }
        .nav-pills .nav-link.active {
            background-color:#D9D9D9;
            border-bottom: 4px solid #7C1332;
            width: 183px;
            height: 60px;
            color:black;
        }
        .nav-pills .nav-link {
            border-radius: 0;
        }
        .nav-link {
            color:black;
            --bs-nav-link-font-size: 20px;
        }
        .nav {
            --bs-nav-link-hover-color: #7C1332;
            background-color: #EFEFEF;
            box-shadow: 0px 0px 4px 0px rgba(0, 0, 0, 0.25);
            height: 60px;
            --bs-nav-link-padding-x: 1rem;
            --bs-nav-link-padding-y: 1rem;
        }
    </style>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
