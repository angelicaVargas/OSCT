<!DOCTYPE html>
<html lang="en">
<!-- Patient User Profile Page-->
<body>
    <div id="header"></div> 
    <div class="main-content d-flex align-self-center">
        <div class="profile-container mt-5"> <!--mt-5: larger top margin-->
            <div class="card">
                <div class="top-buttons d-flex flex-row align-self-center">
                    <button id="back-btn" class="btn-back" href="/src/components/admin_user/users/patient_users.html" data-page="admin_user/users/patient_users">&lt; Go Back</button>
                    <button class="btn-edit">[Update Measurements]</button>
                </div>
                <div class="card-body d-flex flex-column align-self-center align-items-left"> <!--Makes card customizable-->
                    <h1 class="card-title">Patient Measurements</h1>
                    <div class="measurements-container d-flex flex-column align-items-left">
                        <table class="info-table">
                            <tr>
                                <td><strong>Waist:</strong></td>
                                <td>xxx cm</td>
                            </tr>
                            <tr>
                                <td><strong>Hip:</strong></td>
                                <td>xxx cm</td>
                            </tr>
                            <tr>
                                <td><strong>Waist to Hip Ratio:</strong></td>
                                <td>###</td>
                            </tr>
                            <tr>
                                <td><strong>Body Mass:</strong></td>
                                <td>###</td>
                            </tr>
                            <tr>
                                <td><strong>Cholesterol:</strong></td>
                                <td>x mg/dL</td>
                            </tr>
                            <tr>
                                <td><strong>Glucose Level:</strong></td>
                                <td>x mg/dL</td>
                            </tr>
                            <tr>
                                <td><strong>Hemoglobin:</strong></td>
                                <td>xxx %</td>
                            </tr>
                            <tr>
                                <td><strong>Triglycerides:</strong></td>
                                <td>x mg/dL</td>
                            </tr>
                        </table>
                    </div>
                </div>
            </div>
            <div class="button-container mt-5 d-flex flex-column">      
                <a class="record-btn btn-primary" role="button" href="/src/components/admin_user/users/patient_profile.html" data-page="admin_user/users/patient_profile">Patient Profile</a>
                <a class="record-btn btn-primary" role="button" href="/src/components/admin_user/users/patient_measurements.html" data-page="admin_user/users/patient_measurements">Measurements</a>
                <a class="record-btn btn-primary" role="button" href="/src/components/admin_user/users/patient_documents.html" data-page="admin_user/users/patient_documents">Documents</a>
                <a class="record-btn btn-primary" role="button" href="/src/components/admin_user/users/patient_labResults.html" data-page="admin_user/users/patient_labResults">Lab Results</a>
            </div>
        </div>
    </div>
    <script src="/src/loadContent.js"></script>
    <script type="module" src="/src/main.js"></script>
</body>

<style>
    .main-content {
        display:flex;
        justify-content:center;
        width:100%;
        min-height:100vh;
    }
    .profile-container {
        width:70%;
        display:flex;
        justify-content:center;
    }
    .card {
        background-color:#F2F2F2;
        width:34.063rem;
        height:34.188rem;
        position:relative;
    }
    .top-buttons {
        margin-top:0.625rem;
        margin-bottom:0.625rem;
        width:28.063;
        padding-top:0.625rem;
        display:flex;
        flex-direction:row;
    }
    .card-body {
        padding-top:0.625rem;
        display:flex;
        flex-direction:column;
        width:29rem;
    }
    .card-title {
        font-size:2rem;
        font-weight:500;
        margin-top:2.5rem;
    }
    .container-header {
        font-size:1.25rem;
        font-weight:500;
        padding-left:0.875rem;
        padding-top:0.875rem;
    }
    .measurments-container {
        margin-top:0.75rem;
        width:26.688rem;
        height:10.25rem;
        border-radius:0.375rem;
        border:0.063rem solid rgba(0, 0, 0, 0.30);
        background:#FFF;
        display:flex;
        justify-content: left;
        align-items: left;
    }
    .info-table {
        color:#000000;
        font-size:1rem;
        font-weight:400;
    }
    .td {
        border-radius: 6px;
        border-color:#000;
        border-style: solid;
        background: #FFF;
        border-width: 1px;
    }
    .btn-back {
        position:absolute;
        left:1.875rem;
        font-size:1.25rem;
        font-weight:500;
        border:none;
        color:#000;
    }
    .btn-edit {
        position:absolute;
        right:1.875rem;
        border:none;
        color:#000;
        font-size:1.25rem;
        font-weight:500;
       
    }
    .button-container {
        width:13.375rem;
        height:17rem;
        display:flex;
        flex-direction: column;
        justify-content:space-between;
        margin-right:0.5rem;
        margin-left:0.5rem;
    }
    .record-btn {
        width:214px;
        height:60px;
        display:inline-flex;
        padding:18.5px 40px 18.5px 39px;
        justify-content:center;
        align-items:center;
        border-radius:8px;
        background:#6F1A34;
        box-shadow:0px 4px 4px 0px rgba(0, 0, 0, 0.25);
        color:#FFF;
        font-size:20px;
        font-weight:500;
    }
</style>
</html>
