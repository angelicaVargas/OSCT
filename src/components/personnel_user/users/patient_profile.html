<!DOCTYPE html>

<!-- Patient User Profile Page-->
<body>
    <div id="header"></div> 
    <div class="main-content d-flex align-self-center">
        <div class="profile-container mt-5">
            <div class="card">
                <div class="top-buttons d-flex flex-row align-self-center">
                    <button id="back-btn" class="btn-back" href="/src/components/personnel_user/users.html" data-page="personnel_user/users">&lt; Go Back</button>
                    <button class="btn-edit">[Edit Information]</button>
                </div>
                <div class="card-body d-flex flex-column align-self-center"> <!--Makes card customizable-->
                    <h1 class="card-title">Patient Name</h1>
                    <div class="information-container d-flex flex-column align-items-left">
                        <h2 class="container-header">Patient Information</h2>
                        <table id="Table" class="table" table-data="/src/components/patient_user/infoData.json"></table>
                    </div>
                    <div class="contact-container d-flex flex-column align-items-left">
                        <h2 class="container-header">Contact Information</h2>
                        <table id="Table" class="table" table-data="/src/components/patient_user/contactData.json"></table>
                    </div>
                </div>
            </div>
            <div class="button-container mt-5 d-flex flex-column">      
                <a class="record-btn btn-primary" role="button" href="/src/components/personnel_user/users/patient_profile.html" data-page="personnel_user/users/patient_profile">Patient Profile</a>
                <a class="record-btn btn-primary" role="button" href="/src/components/personnel_user/users/patient_measurements.html" data-page="personnel_user/users/patient_measurements">Measurements</a>
                <a class="record-btn btn-primary" role="button" href="/src/components/personnel_user/users/patient_documents.html" data-page="personnel_user/users/patient_documents">Documents</a>
                <a class="record-btn btn-primary" role="button" href="/src/components/personnel_user/users/patient_labResults.html" data-page="personnel_user/users/patient_labResults">Lab Results</a>
            </div>
        </div>
    </div>
    <script src="/src/loadContent.js"></script>
    <script src="/src/components/patient_user/infoData.json"></script>
    <script src="/src/components/patient_user/contactData.json"></script>
    <script type="module" src="/src/main.js"></script>
</body>
