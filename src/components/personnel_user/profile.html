<!DOCTYPE html>
<html lang="en">
<!--Profile Page Script-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Operación Salud Colima Tamizaje</title>
    <link rel="stylesheet" href="/src/style.css">
    <link rel="stylesheet" href="/src/assets/theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <!--Header-->
    <div id="header"></div> 

    <!-- Main Content -->
    <div class="main-content">
        <div class="profile-container mt-5"> <!--mt-5: larger top margin-->
            <div class="card">
                <button class="btn-page btn-primary">[Edit Information]</button>
                <div class="card-body d-flex flex-column align-self-center"> <!--Makes card customizable-->
                    <h1 class="card-title">User Name</h1>
                    <div class="information-container d-flex flex-column align-items-left">
                        <h2 class="container-header">User Information</h2>
                        <table class="info-table">
                            <tr>
                                <td><strong>Position</strong></td>
                                <td>Position Title</td>
                            </tr>
                        </table>
                    </div>
                    <div class="contact-container d-flex flex-column align-items-left">
                        <h2 class="container-header">Contact Information</h2>
                        <table class="info-table">
                            <tr>
                                <td><strong>Email</strong></td>
                                <td>email@</td>
                            </tr>
                            <tr>
                                <td><strong>Phone #</strong></td>
                                <td>(xxx)xxx-xxxx</td>
                            </tr>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/src/loadHeader.js"></script>
    <script type="module" src="/src/main.js"></script>
</body>

<style>
    .main-content {
        display:flex;
        justify-content:center;
        width: 100%;
        min-height: 100vh;
    }
    .profile-container {
        width: 70%;
        display:flex;
        justify-content:center;
    }
    .card {
        background-color:#F2F2F2;
        width: 545px;
        height: 377px;
        position: relative;
    }
    .card-body {
        padding-top: 10px;
        display: flex;
        flex-direction: column;
    }
    .card-title {
        font-size: 32px;
        font-weight: 500;
        margin-top: 40px;
    }
    .container-header {
        font-size: 20px;
        font-weight: 500;
        padding-left: 14px;
        padding-top: 14px;
    }
    .information-container {
        margin-top: 12px;
        width: 449px;
        height: 80px;
        border-radius: 6px;
        border: 1px solid rgba(0, 0, 0, 0.30);
        background: #FFF;
    }
    .contact-container {
        margin-top: 15px;
        width: 449px;
        height: 107px;
        border-radius: 6px;
        border: 1px solid rgba(0, 0, 0, 0.30);
        background: #FFF;
    }
    .info-table {
        margin-left: 14px;
        color: #000000;
        font-size: 16px;
        font-weight: 400;
    }
    .btn-page {
        position: absolute;
        right: 4px;
        width: 214px;
        height: 60px;
        border: none;
        color: #000;
        font-size: 20px;
        font-weight: 500;
        text-decoration-line: underline;
        text-decoration-style: solid;
        text-decoration-skip-ink: auto;
        text-decoration-thickness: auto;
        text-underline-offset: auto;
        text-underline-position: from-font;
  }
</style>

</html>
