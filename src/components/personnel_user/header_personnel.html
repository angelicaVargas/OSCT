<!DOCTYPE html>
<html lang="en">
<!-- Personnel User Header -->
<body>
    <div class="container-fluid main-body">
        <div class="header-container d-flex flex-row"> 
            <!--Logo-->
            <div class="media">
                <img src="/src/assets/img/logoWhite.png" alt="logo" width="45" height="60">
            </div>
            <!--Project name-->
            <div class="project-title-container">
                <h1 class="project-title" style="font-size: 2rem; margin-bottom: 0;">OSCT</h1>
                <h2 class="project-subtitle" style="font-size: 1.125rem; font-weight: 400;">Operación Salud Colima Tamizaje</h2>
            </div>
            <!--Profile Button with Dropdown-->
            <div class="user-container dropdown">
                <a id="profile" class="btn btn-light d-flex align-items-center dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <img src="/src/assets/img/The_Donkey.JPEG" class="img-thumbnail rounded-circle me-2" alt="logo" width="45" height="45">
                    <span class="user-text">Username</span>
                </a>
                <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="profile">
                    <li><a class="dropdown-item" id="profile-button" href="#">View Profile</a></li>
                    <li><a class="dropdown-item" id="signout-button" href="#">Sign Out</a></li>
                </ul>
            </div>
        </div>
    </div>
    <!--Navigation Bar-->
    <div class="navigation-container">
        <nav class="nav nav-pills nav-fill">
            <a class="nav-link" href="/src/components/personnel_user/home.html" data-page="personnel_user/home">Home</a>
            <a class="nav-link" href="/src/components/personnel_user/users.html" data-page="personnel_user/users">Users</a>
            <a class="nav-link" href="/src/components/personnel_user/schedule.html" data-page="personnel_user/schedule">Schedule</a>
        </nav>
    </div>

    <style>
        .main-body {
            background-color: var(--primary-red);
        }
        .header-container {
            background-color: var(--primary-red);
            align-items: center;
            height: 5rem;
        }
        .project-title-container {
            color: var(--white);
            text-align: left;
            margin-left: 1rem;
        }

        .user-container {
            display: flex;
            align-items: center;
            margin-left: auto;
            margin-right: 1rem;
        }
        .btn {
            --bs-btn-border-radius: 0.9375rem !important;
            width: 100%;
            height: 3.125rem;
            border: 0.125rem solid var(--light-surface-three);
            cursor: pointer; 
        }
        .user-text {
            color: var(--dark-surface-three);
            font-size: 1.15rem;
            font-weight: 600;
            margin-right: 0.5rem;
        }
        .img-thumbnail{
            background: none;
            border-radius: 3.125rem;
            border-width: 0.0625rem;
            border-color: transparent;
            padding: 0.2rem;
        }
        .dropdown-menu {
            font-size: 1.15rem;
        }
        .dropdown-item {
            width: 100%;
            min-width: 12rem;
            height: 2.5rem;
        }

/* Navigation Bar */
        .nav-pills .nav-link {
            color:black !important;
            --bs-nav-pills-border-radius: 0;
            width: 7.8125rem !important;
            font-weight: 600;
            --bs-nav-link-font-size: 1.25rem !important; 
        }
        .nav-pills .nav-link.active {
            color: black !important;
            background-color: var(--light-surface-three) !important;
            border-bottom: 0.25rem solid #7C1332 !important;
            font-weight: 600;
            width: 7.8125rem !important;
            height: 3.75rem !important;
        }
        .nav-pills .nav-link:hover {
            color: #7C1332 !important;
            background-color: var(--light-surface-one) !important;
        }
        .nav-pills .nav-link:not(.active):not(:hover) {
            color: black !important;
        }
        .nav {
            background-color: var(--light-surface-two) !important;
            box-shadow: 0rem 0rem 0.25rem 0rem rgba(0, 0, 0, 0.25) !important;
            height: 3.75rem !important;
            --bs-nav-link-padding-x: 1rem !important;
            --bs-nav-link-padding-y: 1rem !important;
        }
    </style>
</body>
</html>
