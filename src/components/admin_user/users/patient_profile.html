<!DOCTYPE html>
<html lang="en">
<!-- Patient User Profile Page-->
<body>
    <div id="header"></div> 
    <div class="main-content">
        <div class="profile-container mt-5"> <!--mt-5: larger top margin-->
            <div class="card">
                <!--TODO: Add patient's records nav buttons-->
                <button class="btn-edit btn-primary">[Edit Information]</button>
                <div class="card-body d-flex flex-column align-self-center"> <!--Makes card customizable-->
                    <!--TODO: Add go back button and edit information button-->
                    <h1 class="card-title">Patient Name</h1>
                    <div class="information-container d-flex flex-column align-items-left">
                        <h2 class="container-header">Patient Information</h2>
                        <table class="info-table">
                            <tr>
                                <td><strong>Patient ID</strong></td>
                                <td>xxxxxxxxxx</td>
                            </tr>
                            <tr>
                                <td><strong>Name of School</strong></td>
                                <td>School Name</td>
                            </tr>
                            <tr>
                                <td><strong>DOB</strong></td>
                                <td>Month/Day/Year</td>
                            </tr>
                            <tr>
                                <td><strong>Gender</strong></td>
                                <td>Male/Female</td>
                            </tr>
                        </table>
                    </div>
                    <div class="contact-container d-flex flex-column align-items-left">
                        <h2 class="container-header">Contact Information</h2>
                        <table class="info-table">
                            <tr>
                                <td><strong>Legal Guardian</strong></td>
                                <td>Name of Legal Guardian</td>
                            </tr>
                            <tr>
                                <td><strong>Phone #</strong></td>
                                <td>(xxx)xxx-xxxx</td>
                            </tr>
                        </table>
                    </div>
                    <button class="btn-page btn-primary">Measurements</button>
                </div>
            </div>
        </div>
    </div>
    <script src="/src/loadContent.js"></script>
    <script type="module" src="/src/main.js"></script>
</body>

<style>
    .main-content {
        display:flex;
        justify-content:center;
        width:100%;
        min-height:100vh;
    }
    .profile-container {
        width:70%;
        display:flex;
        justify-content:center;
    }
    .card {
        background-color:#F2F2F2;
        width:545px;
        height:547px;
        position:relative;
    }
    .card-body {
        padding-top:10px;
        display:flex;
        flex-direction:column;
    }
    .card-title {
        font-size:32px;
        font-weight:500;
        margin-top:40px;
    }
    .container-header {
        font-size:20px;
        font-weight:500;
        padding-left:14px;
        padding-top:14px;
    }
    .information-container {
        margin-top:12px;
        width:449px;
        height:164px;
        border-radius:6px;
        border:1px solid rgba(0, 0, 0, 0.30);
        background:#FFF;
    }
    .contact-container {
        margin-top:15px;
        width:449px;
        height:107px;
        border-radius:6px;
        border:1px solid rgba(0, 0, 0, 0.30);
        background:#FFF;
    }
    .info-table {
        margin-left:14px;
        color:#000000;
        font-size:16px;
        font-weight:400;
    }
    .btn-edit {
        position:absolute;
        right:4px;
        width:214px;
        height:60px;
        border:none;
        color:#000;
        font-size:20px;
        font-weight:500;
        text-decoration-line:underline;
        text-decoration-style:solid;
        text-decoration-skip-ink:auto;
        text-decoration-thickness:auto;
        text-underline-offset:auto;
        text-underline-position:from-font;
    }
    .btn-page {
        margin-top:30px;
        width:214px;
        height:60px;
        display:inline-flex;
        padding:18.5px 40px 18.5px 39px;
        justify-content:center;
        align-items:center;
        border-radius:8px;
        background:#6F1A34;
        box-shadow:0px 4px 4px 0px rgba(0, 0, 0, 0.25);
        color:#FFF;
        font-size:20px;
        font-weight:500;
        align-self:center;
  }
</style>
</html>
