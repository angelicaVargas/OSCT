<!DOCTYPE html>
<html lang="en">
<!-- Admin User Profile Page-->
<body>
    <div id="header"></div> 
    <div class="main-content">
        <div class="profile-container mt-5">
            <div class="card">
                <div class="top-buttons d-flex flex-row align-self-center">
                    <button id="back-btn" class="btn-back" href="/src/components/admin_user/users/admin_users.html" data-page="admin_user/users/admin_users">&lt; Go Back</button>
                    <button class="btn-edit">[Edit Information]</button>
                </div>
                <div class="card-body d-flex flex-column align-self-center">
                    <h1 class="card-title">Admin Name</h1>
                    <div class="information-container d-flex flex-column align-items-left">
                        <h2 class="container-header">User Information</h2>
                        <table id="Table" class="table" table-data="/src/components/admin_user/users/data/infoData.json"></table>
                    </div>
                    <div class="contact-container d-flex flex-column align-items-left">
                        <h2 class="container-header">Contact Information</h2>
                        <table id="Table" class="table" table-data="/src/components/admin_user/users/data/contactData.json"></table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/src/loadContent.js"></script>
    <script src="/src/components/admin_user/users/data/infoData.json"></script>
    <script src="/src/components/admin_user/users/data/contactData.json"></script>
    <script type="module" src="/src/main.js"></script>
</body>
<style>
    .main-content {
        display:flex;
        justify-content:center;
        width:100%;
        min-height:100vh;
    }
    .profile-container {
        width:70%;
        display:flex;
        justify-content:center;
    }
    .card {
        background-color:#F2F2F2;
        width:545px;
        height:700px;
        position:relative;
    }
    .top-buttons {
        margin-top:10px;
        margin-bottom:10px;
        width:449px;
        padding-top:10px;
        display:flex;
        flex-direction:row;
    }
    .card-body {
        padding-top:10px;
        display:flex;
        flex-direction:column;
    }
    .card-title {
        font-size:32px;
        font-weight:500;
        margin-top:40px;
    }
    .container-header {
        font-size:20px;
        font-weight:500;
        padding-left:14px;
        padding-top:14px;
    }
    .information-container {
        margin-top:12px;
        width:449px;
        height:auto;
        border-radius:6px;
        border:1px solid rgba(0, 0, 0, 0.30);
        background:#FFF;
    }
    .contact-container {
        margin-top:15px;
        width:449px;
        height:auto;
        border-radius:6px;
        border:1px solid rgba(0, 0, 0, 0.30);
        background:#FFF;
    }
    .table {
        margin-left:14px;
        color:#000000;

        font-weight:400;

    }
    .btn-back {
        position:absolute;
        left:30px;
        font-size:20px;
        font-weight:500;
        border:none;
        color:#000;
        background:#F2F2F2;
    }
    .btn-edit {
        position:absolute;
        right:30px;
        border:none;
        color:#000;
        background:#F2F2F2;
        font-size:20px;
        font-weight:500;
    }
