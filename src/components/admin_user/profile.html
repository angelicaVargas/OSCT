<!DOCTYPE html>
<html lang="en">
<!--Admin User Profile Page-->
<body>
    <div id="header"></div> 
    <div class="main-content">
        <div class="profile-container mt-5">
            <div class="card">
                <button class="btn-page btn-primary">[Edit Information]</button>
                <div class="card-body d-flex flex-column align-self-center"> <!--Makes card customizable-->
                    <h1 class="card-title">User Name</h1>
                    <div class="information-container d-flex flex-column align-items-left">
                        <h2 class="container-header">User Information</h2>
                        <table id="Table" class="table" table-data="/src/components/admin_user/infoData.json"></table>
                    </div>
                    <div class="contact-container d-flex flex-column align-items-left">
                        <h2 class="container-header">Contact Information</h2>
                        <table id="Table" class="table" table-data="/src/components/admin_user/contactData.json"></table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/src/loadContent.js"></script>
    <script src="/src/components/admin_user/infoData.json"></script>
    <script src="/src/components/admin_user/contactData.json"></script>
    <script type="module" src="/src/main.js"></script>
</body>
<style>
    .main-content {
        display:flex;
        justify-content:center;
        width:100%;
        min-height:100vh;
    }
    .profile-container {
        width:70%;
        display:flex;
        justify-content:center;
    }
    .card {
        background-color:#F2F2F2;
        width:545px;
        height:auto;
        position:relative;
    }
    .card-body {
        padding-top:10px;
        display:flex;
        flex-direction:column;
    }
    .card-title {
        font-size:32px;
        font-weight:500;
        margin-top:40px;
    }
    .container-header {
        font-size:20px;
        font-weight:500;
        padding-left:14px;
        padding-top:14px;
    }
    .information-container {
        margin-top:12px;
        width:449px;
        height:auto;
        border-radius:6px;
        border:1px solid rgba(0, 0, 0, 0.30);
        background:#FFF;
    }
    .contact-container {
        margin-top:15px;
        width:449px;
        height:auto;
        border-radius:6px;
        border:1px solid rgba(0, 0, 0, 0.30);
        background:#FFF;
    }
    .table {
        margin-left:14px;
        color:#000000;
        font-size:16px;
        font-weight:400;
        width:auto;
    }
    .btn-page {
        position:absolute;
        right:4px;
        width:214px;
        height:60px;
        border:none;
        color:#000;
        font-size:20px;
        font-weight:500;
        text-decoration-line:underline;
        text-decoration-style:solid;
        text-decoration-skip-ink:auto;
        text-decoration-thickness:auto;
        text-underline-offset:auto;
        text-underline-position:from-font;
  }
</style>
</html>
