<!DOCTYPE html>
<html lang="en">
<!--Documents Page Script-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documents - Operación Salud Colima Tamizaje</title>
    <link rel="stylesheet" href="/src/style.css">
    <link rel="stylesheet" href="/src/assets/theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>
    <!-- Placeholder for the header -->
    <div id="header"></div> 

    <!-- Main Content -->
    <div class="main-content">
        <div class="document-container mt-5"> <!--mt-5: larger top margin-->
            <div class="card">
                <div class="card-body d-flex flex-column"> <!--Makes card customizable-->
                    <h1 class="card-title">Documents</h1>
                    <!-- Placeholder for the documents table -->
                    <div id="documentsTable"></div>
                    <!-- Example table to show until database is ready-->
                    <h2 class="table-title">Example Schedule Display Filler</h2>
                    <table class="table">
                        <thead>
                          <tr>
                            <th>Document Name</th>
                            <th>Date Assigned</th>
                            <th>Download Link</th>
                          </tr>
                        </thead>
                    </table>
                    <hr class="my-1 line">
                    <table class="table">
                        <tbody> <!-- id="function to load documents into table"-->
                          <!-- Add functionality to pull documents from somewhere, database?-->
                            <tr>
                                <td>Document</td>
                                <td>March 17th, 2025</td>
                                <td><a href="${item.link}" class="btn btn-link">Download</a></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Load Header-->
    <script src="/src/loadHeader.js"></script>
    <!-- Load Table-->
    <script type="module">
        import{loadTable} from '/src/loadTable.js'
        const page = 'documents'
        loadTable(page)
    </script>
    <script type="module" src="/src/main.js"></script>
</body>

<style>
    .main-content {
        display:flex;
        justify-content:center;
        width: 100%;
        align-items:center;
        min-height:100vh;
    }
    .document-container {
        width:70%;
    }
    .card {
        background-color:#F2F2F2;
        height:100%;
        min-height:100vh;
    }
    .card-title {
        font-size:30px;
        text-align:left;
        margin-bottom:25px;
    }
    .table {
        margin-bottom:0px;
    }
    .table-title {
        font-size: 20px;
        margin-bottom:20px;
    }
    .line {
        border-top:2px solid var(--black);
        width:95%;
        margin-top:0px;
        margin-bottom:0px;
    }
</style>

</html>
