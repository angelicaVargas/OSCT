<!DOCTYPE html>
<html lang="en">
<!-- Patient Documents Page-->
<body>
    <div id="header"></div> 
    <div class="main-content">
        <div class="document-container mt-5"> <!--mt-5: larger top margin-->
            <div class="card">
                <div class="card-body d-flex flex-column"> <!--Makes card customizable-->
                    <div class="document-content">
                        <h1 class="card-title">Documents</h1>
                        <!-- Placeholder for the documents table -->
                        <div id="documentsTable"></div>
                        <!-- Example table to show until database is ready-->
                        <h2 class="table-title">Example List of Documents Table</h2>
                        <table id="docTable" class="table" table-data="/src/components/docData.json">
                            <thead></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/src/loadContent.js"></script>
    <script src="/src/components/docData.json"></script>
    <script type="module" src="/src/main.js"></script>
</body>
<style>
    .main-content{
        display:flex;
        justify-content:center;
        width: 100%;
        align-items:center;
        min-height:100vh;
    }
    .document-container{
        width:70%;
    }
    .card{
        background-color:#F2F2F2;
        height:100%;
        min-height:100vh;
    }
    .document-content{
        margin-left:25px;
        margin-right:25px;
    }
    .card-title{
        font-size:32px;
        font-weight: 500;
        text-align:left;
        margin-bottom:25px;
        margin-top:25px;
    }
    .table{
        margin-bottom:0px;
        --bs-table-bg:#F2F2F2;
        --bs-table-border-color:#000;
        align-items:center;

    }
    .td a{
        display:flex;
        align-items:center;
        justify-content:center;
        color:#000;
    }
    .table-title{
        font-size: 20px;
        margin-bottom:20px;
    }
</style>
</html>
