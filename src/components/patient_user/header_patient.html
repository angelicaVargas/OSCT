<!DOCTYPE html>
<html lang="en">
<body>
    <div class="container-fluid main-body">
        <div class="header-container d-flex flex-row"> 
            <!--Logo-->
            <div class="media">
                <img src="/src/assets/img/logoWhite.png" alt="logo" width="45" height="60">
            </div>
            <!--Project name-->
            <div class="project-title-container">
                <h1 class="project-title" style="font-size: 32px; margin-bottom: 0;">OSCT</h1>
                <h2 class="project-subtitle" style="font-size: 18px; font-weight: 400;">Operación Salud Colima Tamizaje</h2>
            </div>
            <!--Profile Button-->
            <div class="user-container ms-auto">
                <a id="profile-button" class="btn btn-light d-flex align-items-center" href="/src/components/patient_user/profile.html" role="button" data-page="patient_user/profile">
                    <img src="/src/assets/img/The_Donkey.JPEG" class="img-thumbnail rounded-circle me-2" alt="logo" width="45" height="45">
                    <span class="user-text">Profile</span>
                </a>
            </div>
        </div>
    </div>
    <!--Navigation Bar-->
    <div class="navigation-container">
        <nav class="nav nav-pills nav-fill">
            <a class="nav-link" href="/src/components/patient_user/home.html" data-page="patient_user/home">Home</a>
            <a class="nav-link" href="/src/components/patient_user/schedule.html" data-page="patient_user/schedule">Schedule</a>
            <a class="nav-link" href="/src/components/patient_user/lab_results.html" data-page="patient_user/lab_results">Lab Results</a>
            <a class="nav-link" href="/src/components/patient_user/documents.html" data-page="patient_user/documents">Documents</a>
        </nav>
    </div>

    <style>
        .main-body {
            background-color: var(--primary-red);
        }
        .header-container {
            background-color: var(--primary-red);
            height: 80px;
            align-items: center;
        }
        .project-title-container {
            color: var(--white);
            text-align: left;
            margin-left: 16px;
        }

        .user-container {
            margin-left: auto;
            margin-right: 16px;
            align-items: center;
        }
        .btn {
            --bs-btn-border-radius: 15px !important;
            width: 100%;
            height: 50px;
            border: 2px solid var(--light-surface-three);
            cursor: pointer; 
        }
        .user-text {
            font-size: 16px;
            font-weight: 600;
            color: var(--dark-surface-three)
        }
        .img-thumbnail{
            border-radius: 50px;
            background: none;
            border-width: 1px;
            border-color: transparent;
            padding: 0.2rem;
        }

/* Navigation Bar */
        .nav-pills .nav-link {
            border-radius: 0 !important;
            width: 125px !important;
            color: black !important;
            --bs-nav-link-font-size: 20px !important; 
            font-weight: 600;
        }
        .nav-pills .nav-link.active {
            background-color: var(--light-surface-three) !important;
            border-bottom: 4px solid #7C1332 !important;
            font-weight: 600;
            width: 125px !important;
            height: 60px !important;
        }
        .nav-pills .nav-link:hover {
            color: #7C1332 !important;
            background-color: var(--light-surface-one) !important;
        }
        .nav {
            background-color: var(--light-surface-two) !important;
            box-shadow: 0px 0px 4px 0px rgba(0, 0, 0, 0.25) !important;
            height: 60px !important;
            --bs-nav-link-padding-x: 1rem !important;
            --bs-nav-link-padding-y: 1rem !important;
        }
    </style>
</body>
</html>
