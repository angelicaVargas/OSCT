<!DOCTYPE html>
<html lang="en">
<body>
    <div class="container-fluid main-body">
        <div class="header-container d-flex flex-row"> 
            <!--Logo-->
            <div class="media">
                <img src="/src/assets/img/logoWhite.png" alt="logo" width="45" height="60">
            </div>
            <!--Project name-->
            <div class="project-title-container">
                <h1 class="project-title" style="font-size: 32px; margin-bottom: 0;">OSCT</h1>
                <h2 class="project-subtitle" style="font-size: 18px; font-weight: 400;">Operación Salud Colima Tamizaje</h2>
            </div>
            <!--Profile Button-->
            <div class="user-container">
                <a class="btn btn-light" href="profile.html" role="button">
                    <img src="/src/assets/img/The_Donkey.JPEG" class="img-thumbnail" alt="logo" width="50" height="50">
                    Profile 
                </a>
            </div>
        </div>
    </div>
    <!--Navigation Bar-->
    <div class="navigation-container">
        <nav class="nav nav-pills nav-fill">
            <a class="nav-link" href="index.html" data-page="index">Home</a>
            <a class="nav-link" href="/src/components/schedule.html" data-page="schedule">Schedule</a>
            <a class="nav-link" href="/src/components/lab_results.html" data-page="lab_results">Lab Results</a>
            <a class="nav-link" href="/src/components/documents.html" data-page="documents">Documents</a>
        </nav>
    </div>

    <style>
        .main-body {
            background-color: var(--primary-red);
        }
        .header-container {
            background-color: var(--primary-red);
            height: 80px;
            align-items: center;
        }
        .project-title-container {
            color: var(--white);
            text-align: left;
            margin-left: 16px;
        }

        .user-container {
            margin-left: auto;
            margin-right: 16px;
            align-items: center;
        }
        .btn {
            --bs-btn-border-radius: 10px; 
            width: 120px;
            height: 50px;
            flex-shrink: 0;
            display: flex;
            column-gap: 2px;
            justify-content: space-between;
            align-items: center;
            border: 2px solid var(--light-surface-three);
            border-radius: 10px;
            cursor: pointer; 
            font-size: 16px;
            font-weight: 500;
            color: var(--dark-surface-three)
        }
        .img-thumbnail{
            border-radius: 50px;
            background: none;
            border-width:1px;
            border-color: transparent;
            padding: .2rem;
        }

        .nav-pills .nav-link {
            border-radius: 0;
            width: 125px;
        }
        .nav-pills .nav-link.active {
            background-color:#D9D9D9;
            border-bottom: 4px solid #7C1332;
            width: 125px;
            height: 60px;
            color:black;
        }
        .nav-link {
            color:black;
            --bs-nav-link-font-size: 20px;
        }
        .nav {
            --bs-nav-link-hover-color: #7C1332;
            background-color: #EFEFEF;
            box-shadow: 0px 0px 4px 0px rgba(0, 0, 0, 0.25);
            height: 60px;
            --bs-nav-link-padding-x: 1rem;
            --bs-nav-link-padding-y: 1rem;
        }
    </style>
</body>
</html>
