<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operacion Salud Colima Tamizaje</title>
    <link rel="stylesheet" href="/src/style.css">
    <link rel="stylesheet" href="/src/public/theme.css">
</head>
<body>
    <!-- Navigation Bar Component-->
    <nav class="nav nav-pills nav-fill">
        <!-- href="#"  indicates that link is available to the users-->
         <!-- aria-current indicates that the user is on that page-->
            <a class="nav-link active" aria-current="page" href="#">Home</a>
            <a class="nav-link" href="#">Schedule</a>
            <a class="nav-link" href="#">Lab Results</a>
            <a class="nav-link" href="#">Documents</a>
            <form class="d-flex" role="search">
                <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
    </nav>
    <div class="container text-center mt-5">
        <h1 class="text-primary">Operacion Salud Colima Tamizaje</h1>
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#exampleModal">Alert!</button>
    </div>

    <!-- Bootstrap Modal Component -->
    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="exampleModalLabel">New Document Added!</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Example: Lab Results January 28th 2025
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
