    <div class="container-fluid main-body">
        <div class="header-container d-flex flex-row"> 
            <div class="media">
                <img src="/src/assets/img/logoWhite.png" alt="logo" width="45" height="60">
            </div>
            <div class="project-title-container">
                <h1 class="project-title" style="font-size: 32px; margin-bottom: 0;">OSCT</h1>
                <h2 class="project-subtitle" style="font-size: 18px; font-weight: 400;">Operación Salud Colima Tamizaje</h2>
            </div>
            <div class="user-container">
                <button type="button" class="btn btn-light user-button">
                    <i class="fas fa-user user-icon" style="font-size: 24px;"></i>
                    Profile
                </button>
            </div>
        </div>
    </div>

    <style>
        .main-body {
            background-color: var(--primary-red);
        }
        .header-container {
            background-color: var(--primary-red);
            height: 80px;
            align-items: center;
        }
        .project-title-container {
            color: var(--white);
            text-align: left;
            margin-left: 16px;
        }
        .user-container {
            margin-left: auto;
            margin-right: 16px;
            align-items: center;
        }
        .user-button {
            display: flex;
            align-items: center;
            border: 2px solid var(--light-surface-three);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer; 
            font-size: 16px;
            font-weight: 500;
            color: var(--dark-surface-three)
        }
        .user-icon {
            color: var(--dark-surface-one);
            margin-right: 16px;
        }
    </style>
